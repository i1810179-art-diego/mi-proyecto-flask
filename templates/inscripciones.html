{% extends "base.html" %}
{% block title %}Inscripciones{% endblock %}

{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h3>Inscripciones</h3>

    <a href="/inscripciones/nueva" class="btn btn-success"> 
        Nueva Inscripción
    </a>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Alumno</th>
            <th>Curso</th>
        </tr>
    </thead>
    <tbody>
        {% for i in inscripciones %}
        <tr>
            <td>{{ i.id }}</td>
            <td>{{ i.usuario }}</td>
            <td>{{ i.curso }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/usuarios" class="btn btn-outline-secondary btn-sm">
    Volver
</a>
{% endblock %}
